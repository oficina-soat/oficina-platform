apiVersion: apps/v1
kind: Deployment
metadata:
  name: oficina-billing-service
  labels:
    app.kubernetes.io/name: oficina-billing-service
    app.kubernetes.io/part-of: oficina
    app.kubernetes.io/component: service
spec:
  replicas: 1
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app.kubernetes.io/name: oficina-billing-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oficina-billing-service
        app.kubernetes.io/part-of: oficina
        app.kubernetes.io/component: service
    spec:
      serviceAccountName: oficina-billing-service
      terminationGracePeriodSeconds: 30
      containers:
        - name: oficina-billing-service
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: oficina-billing-service-config
            - secretRef:
                name: oficina-billing-service-database-env
          volumeMounts:
            - name: jwt-keys
              mountPath: /jwt
              readOnly: true
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: jwt-keys
          secret:
            secretName: oficina-jwt-keys
